<!DOCTYPE html>
<html>

<head>
    <title>Order Menu</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>🍽️ Place Your Order</h1>

        <div class="card">

            <input id="name" placeholder="Customer Name">
            <input id="location" placeholder="Location">

            <h3>Appetizers</h3>
            <select id="appetizer">
                <option value="">Select appetizer</option>
                <option value="Spring Rolls">Spring Rolls</option>
                <option value="Samosa">Samosa</option>
            </select>
            <input id="appetizerQty" type="number" placeholder="Qty">

            <h3>Main Meals</h3>
            <select id="main">
                <option value="">Select main meal</option>
                <option value="Jollof Rice">Jollof Rice</option>
                <option value="Fried Rice">Fried Rice</option>
                <option value="Chicken">Chicken</option>
            </select>
            <input id="mainQty" type="number" placeholder="Qty">

            <h3>Drinks</h3>
            <select id="drink">
                <option value="">Select drink</option>
                <option value="Fanta">Fanta</option>
                <option value="Coke">Coke</option>
                <option value="Chapman">Chapman</option>
            </select>
            <input id="drinkQty" type="number" placeholder="Qty">

            <button onclick="previewOrder()">Add Order</button>

        </div>

    </div>


    <!-- MODAL -->
    <div id="modal" class="modal hidden">
        <div class="modal-content">
            <h2>Confirm Order</h2>

            <div id="preview"></div>

            <button onclick="submitOrder()">Confirm</button>
            <button onclick="closeModal()">Cancel</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
