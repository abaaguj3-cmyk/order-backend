<!DOCTYPE html>
<html>

<head>
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>📊 Admin Dashboard</h1>

    <div class="admin-controls">
        <button onclick="loadOrders()">🔄 Refresh</button>
        <button onclick="exportCSV()">⬇️ Export CSV</button>
    </div>

    <div class="filters">
        <input id="filterName" placeholder="Filter by customer name">
        <input id="filterLocation" placeholder="Filter by location">
        <input id="filterDate" type="date">
        <button onclick="loadOrders()">Apply Filters</button>
    </div>

    <table border="1">
        <thead>
            <tr>
                <th>Name</th>
                <th>Item</th>
                <th>Qty</th>
                <th>Location</th>
                <th>Date</th>
            </tr>
        </thead>

        <tbody id="ordersTable"></tbody>
    </table>

    <script src="admin.js"></script>
</body>

</html>
